
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borafrete - Login</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<style>*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
background:#f4f6f8;
}

.container{
display:flex;
height:100vh;
}

/* ESQUERDA */

.left{
width:50%;
background:url("bg-logistica.png") center/cover no-repeat;
position:relative;
}

.overlay{
background:linear-gradient(135deg,#1c6a8c,#2f8db7);
opacity:0.92;
height:100%;
display:flex;
align-items:center;
justify-content:center;
padding:60px;
}

.info{
color:white;
max-width:400px;
}

.info h2{
font-weight:400;
margin-top:20px;
line-height:1.6;
}

.icons{
font-size:28px;
letter-spacing:10px;
}

.icons-bottom{
margin-top:40px;
font-size:20px;
letter-spacing:12px;
opacity:0.9;
}

/* DIREITA */

.right{
width:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
width:350px;
}

.logo{
font-size:28px;
color:#6aaed6;
margin-bottom:30px;
}

.logo span{
font-weight:600;
margin-left:8px;
}

.login-box h1{
font-size:26px;
margin-bottom:6px;
}

.login-box p{
color:#666;
margin-bottom:30px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:14px;
border-radius:8px;
border:1px solid #dcdcdc;
font-size:14px;
}

button{
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#6aaed6,#4f95c5);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.links{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

.links a{
text-decoration:none;
color:#555;
}

.divider{
height:1px;
background:#eee;
margin:30px 0;
}

.social{
display:flex;
flex-direction:column;
gap:10px;
}

.social button{
border-radius:8px;
background:#f5f5f5;
color:#333;
font-size:14px;
}</style>

<body>

<div class="container">

    <!-- LADO ESQUERDO -->
    <div class="left">

        <div class="overlay">

            <div class="info">

                <div class="icons">
                    🚚 ✈️ 📦
                </div>

                <h2>
                    Plataforma líder em logística de fretes e encomendas.
                    Otimize seus envios hoje.
                </h2>

                <div class="icons-bottom">
                    🚛 💬 👤 📞
                </div>

            </div>

        </div>

    </div>


    <!-- LADO DIREITO -->
    <div class="right">

        <div class="login-box">

            <div class="logo">
                📍 <span>borafrete</span>
            </div>

            <h1>Acesse Sua Conta</h1>
            <p>Conecte-se e comece a enviar</p>

            <form>

                <input type="email" placeholder="E-mail">

                <input type="password" placeholder="Senha">

                <button>Entrar</button>

            </form>

            <div class="links">
                <a href="#">Esqueceu a senha?</a>
                <a href="#">Criar uma conta</a>
            </div>

            <div class="divider"></div>

            <div class="social">

                <button class="google">Entrar com Google</button>
                <button class="facebook">Entrar com Facebook</button>
                <button class="linkedin">Entrar com LinkedIn</button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freight Logistics Platform</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
</head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>

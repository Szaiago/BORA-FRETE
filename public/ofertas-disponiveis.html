<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreteLog - Ofertas Disponíveis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'navy': '#001f3f',
            'executive-gray': '#4a5568'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50">

  <!-- Sidebar -->
  <div class="fixed top-0 left-0 h-full w-64 bg-navy text-white shadow-lg z-50">
    <div class="p-6 border-b border-gray-700">
      <h1 class="text-2xl font-bold">FreteLog</h1>
      <p class="text-sm text-gray-400 mt-1" id="userEmail"></p>
    </div>

    <nav class="p-4 space-y-2" id="navigation">
      <!-- Links serão inseridos dinamicamente -->
    </nav>

    <div class="absolute bottom-0 w-full p-4 border-t border-gray-700">
      <button onclick="handleLogout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">Sair</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="ml-64 p-8">
    <div class="max-w-7xl mx-auto">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-navy mb-2">Ofertas Disponíveis</h2>
        <p class="text-executive-gray">Encontre fretes disponíveis</p>
      </div>

      <!-- Filtros -->
      <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <h3 class="text-lg font-bold text-navy mb-4">Filtros</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Origem (UF)</label>
            <input type="text" id="filtroOrigemUF" maxlength="2" placeholder="Ex: SP" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-navy uppercase">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Destino (UF)</label>
            <input type="text" id="filtroDestinoUF" maxlength="2" placeholder="Ex: RJ" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-navy uppercase">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Veículo</label>
            <select id="filtroTipoVeiculo" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-navy">
              <option value="">Todos</option>
              <option value="Van">Van</option>
              <option value="Fiorino">Fiorino</option>
              <option value="3/4">3/4</option>
              <option value="Toco">Toco</option>
              <option value="Truck">Truck</option>
              <option value="Carreta">Carreta</option>
              <option value="Rodotrem">Rodotrem</option>
            </select>
          </div>
          <div class="flex items-end">
            <button onclick="applyFilters()" class="w-full bg-navy text-white py-2 rounded-lg hover:bg-blue-900 transition font-semibold">
              Buscar
            </button>
          </div>
        </div>
      </div>

      <!-- Lista de Ofertas -->
      <div id="ofertasLista" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Ofertas serão carregadas aqui -->
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module">
    import { createClient } from 'https://unpkg.com/@supabase/supabase-js@2/dist/module/index.js';

    const supabaseUrl = '{{ VITE_SUPABASE_URL }}';
    const supabaseAnonKey = '{{ VITE_SUPABASE_ANON_KEY }}';
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    window.supabase = supabase;
  </script>
  <script src="js/ofertas-disponiveis.js"></script>
</body>
</html>

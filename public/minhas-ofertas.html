<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreteLog - Minhas Ofertas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'navy': '#001f3f',
            'executive-gray': '#4a5568'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50">

  <!-- Sidebar -->
  <div class="fixed top-0 left-0 h-full w-64 bg-navy text-white shadow-lg z-50">
    <div class="p-6 border-b border-gray-700">
      <h1 class="text-2xl font-bold">FreteLog</h1>
      <p class="text-sm text-gray-400 mt-1" id="userEmail"></p>
    </div>

    <nav class="p-4 space-y-2">
      <a href="dashboard.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700 transition">Início</a>
      <a href="ofertas-carga.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700 transition">Criar Oferta de Carga</a>
      <a href="minhas-ofertas.html" class="block px-4 py-3 rounded-lg bg-gray-700">Minhas Ofertas</a>
    </nav>

    <div class="absolute bottom-0 w-full p-4 border-t border-gray-700">
      <button onclick="handleLogout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">Sair</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="ml-64 p-8">
    <div class="max-w-7xl mx-auto">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold text-navy mb-2">Minhas Ofertas</h2>
          <p class="text-executive-gray">Gerencie suas ofertas de carga</p>
        </div>
        <a href="ofertas-carga.html" class="bg-navy text-white px-6 py-3 rounded-lg hover:bg-blue-900 transition font-semibold">
          + Nova Oferta
        </a>
      </div>

      <div id="ofertasLista" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Ofertas serão carregadas aqui -->
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module">
    import { createClient } from 'https://unpkg.com/@supabase/supabase-js@2/dist/module/index.js';

    const supabaseUrl = '{{ VITE_SUPABASE_URL }}';
    const supabaseAnonKey = '{{ VITE_SUPABASE_ANON_KEY }}';
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    window.supabase = supabase;
  </script>
  <script src="js/minhas-ofertas.js"></script>
</body>
</html>
